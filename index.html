<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIU Luxury</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
}

header{
    background:black;
    color:gold;
    padding:20px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
}

.hero{
    text-align:center;
    padding:80px 20px;
}

.hero h1{
    font-size:45px;
    color:gold;
}

.hero p{
    font-size:20px;
}

.button{
    display:inline-block;
    margin-top:20px;
    padding:15px 30px;
    background:gold;
    color:black;
    text-decoration:none;
    font-weight:bold;
    border-radius:5px;
}

.products{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    padding:40px;
}

.card{
    width:250px;
    background:#222;
    border-radius:10px;
    padding:20px;
    text-align:center;
}

.card img{
    width:100%;
    border-radius:10px;
}

footer{
    text-align:center;
    padding:20px;
    background:black;
    color:white;
}
</style>
</head>

<body>

<header>
AIU Luxury
</header>

<section class="hero">
<h1>Luxury Redefined</h1>
<p>Premium Fashion • Shoes • Watches • Bags</p>

<a href="#" class="button">Shop Now</a>
</section>

<section class="products">

<div class="card">
<h2>Luxury Shoes</h2>
<p>Latest designer footwear.</p>
</div>

<div class="card">
<h2>Luxury Bags</h2>
<p>Premium handbags and accessories.</p>
</div>

<div class="card">
<h2>Luxury Watches</h2>
<p>Elegant watches for every occasion.</p>
</div>

</section>

<footer>
© 2025 AIU Luxury. All Rights Reserved.
</footer>

</body>
</html>
